version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rezervacije
      POSTGRES_USER: rezervacije
      POSTGRES_PASSWORD: rezervacije_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgres://rezervacije:rezervacije_dev@db:5432/rezervacije
      JWT_SECRET: dev-secret-change-in-production
      PORT: 3001
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  pgdata:
